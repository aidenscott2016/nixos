---
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: nixos
  namespace: flux-system
spec:
  interval: 1m0s
  ref:
    branch: main
  secretRef:
    name: flux-system
  url: ssh://git@github.com/aidenscott2016/nixos
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: bes
  namespace: flux-system
spec:
  interval: 10m0s
  path: ./k8s/bes
  prune: true
  sourceRef:
    kind: GitRepository
    name: nixos
  decryption:
    provider: sops
    secretRef:
      name: sops-age
