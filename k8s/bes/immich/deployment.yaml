apiVersion: apps/v1
kind: Deployment
metadata:
  name: immich
  namespace: media
spec:
  replicas: 1
  selector:
    matchLabels:
      app: immich
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: immich
    spec:
      nodeName: bes
      securityContext:
        supplementalGroups: [44, 109]  # video, render
      containers:
        - name: immich-server
          image: ghcr.io/immich-app/immich-server:release
          env:
            - name: LIBVA_DRIVER_NAME
              value: iHD
            - name: DB_HOSTNAME
              value: localhost
            - name: DB_USERNAME
              value: immich
            - name: DB_PASSWORD
              value: immich
            - name: DB_DATABASE_NAME
              value: immich
            - name: REDIS_HOSTNAME
              value: localhost
            - name: UPLOAD_LOCATION
              value: /photos
          ports:
            - containerPort: 2283
          volumeMounts:
            - name: photos
              mountPath: /photos
            - name: dri
              mountPath: /dev/dri
          resources:
            requests:
              memory: "256Mi"
            limits:
              memory: "2Gi"
        - name: immich-machine-learning
          image: ghcr.io/immich-app/immich-machine-learning:release
          env:
            - name: MACHINE_LEARNING_CACHE_FOLDER
              value: /cache
          volumeMounts:
            - name: ml-cache
              mountPath: /cache
          resources:
            requests:
              memory: "512Mi"
            limits:
              memory: "2Gi"
        - name: postgres
          image: tensorchord/pgvecto-rs:pg14-v0.2.0
          env:
            - name: POSTGRES_USER
              value: immich
            - name: POSTGRES_PASSWORD
              value: immich
            - name: POSTGRES_DB
              value: immich
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              memory: "128Mi"
            limits:
              memory: "512Mi"
        - name: redis
          image: redis:7-alpine
          resources:
            requests:
              memory: "32Mi"
            limits:
              memory: "128Mi"
      volumes:
        - name: photos
          hostPath:
            path: /media/t7/photos
        - name: pgdata
          hostPath:
            path: /var/lib/k8s-state/immich/pgdata
            type: DirectoryOrCreate
        - name: ml-cache
          hostPath:
            path: /var/lib/k8s-state/immich/ml-cache
            type: DirectoryOrCreate
        - name: dri
          hostPath:
            path: /dev/dri
